// ═══ DB ═══
async function dbQuery(table, filters={}, order=null) {
  let q = sb.from(table).select('*');
  Object.entries(filters).forEach(([k,v])=>{ q = q.eq(k,v); });
  if(order) q = q.order(order.col, {ascending:order.asc});
  const {data,error} = await q;
  if(error) throw error;
  return data||[];
}

async function dbInsert(table, obj) {
  const {data,error} = await sb.from(table).insert(obj).select().single();
  if(error) throw error;
  return data;
}

async function dbUpdate(table, id, obj) {
  const {data,error} = await sb.from(table).update(obj).eq('id',id).select().single();
  if(error) throw error;
  return data;
}

async function dbDelete(table, id) {
  const {error} = await sb.from(table).delete().eq('id',id);
  if(error) throw error;
}

async function getCustomers() {
  let q = sb.from('customers').select('*').order('name');
  if(currentUser.role!=='admin') q = q.eq('rep_id', currentUser.id);
  const {data,error} = await q;
  if(error) throw error;
  return data||[];
}

async function getInvoices(custId=null) {
  let q = sb.from('invoices').select('*').order('date',{ascending:false});
  if(currentUser.role!=='admin') q = q.eq('rep_id', currentUser.id);
  if(custId) q = q.eq('customer_id', custId);
  const {data,error} = await q;
  if(error) throw error;
  return data||[];
}

async function getPayments(custId=null) {
  let q = sb.from('payments').select('*').order('date',{ascending:false});
  if(currentUser.role!=='admin') q = q.eq('rep_id', currentUser.id);
  if(custId) q = q.eq('customer_id', custId);
  const {data,error} = await q;
  if(error) throw error;
  return data||[];
}

// ═══ AUTH ═══
$('login-btn').onclick = async () => {
  const email = $('login-email').value.trim();
  const pass  = $('login-pass').value;
  if(!email||!pass) return;
  $('login-btn').textContent = 'جارٍ الدخول...';
  $('login-err').style.display = 'none';
  try {
    const {data,error} = await sb.auth.signInWithPassword({email,password:pass});
    if(error) throw error;
    const {data:profile,error:pe} = await sb.from('profiles').select('*').eq('id',data.user.id).single();
    if(pe||!profile) throw new Error('لم يتم العثور على الملف الشخصي');
    currentUser = {id:data.user.id, email:data.user.email, name:profile.name||data.user.email, role:profile.role||'rep'};
    showApp();
  } catch(e) {
    $('login-err').textContent = e.message==='Invalid login credentials'?'البريد الإلكتروني أو كلمة المرور غير صحيحة':e.message;
    $('login-err').style.display = 'block';
  }
  $('login-btn').textContent = 'تسجيل الدخول';
};

$('login-pass').onkeydown = e => { if(e.key==='Enter') $('login-btn').click(); };

$('logout-btn').onclick = async () => {

};

function buildNav() {
  const nav = $('nav');
  nav.innerHTML = '';
  pages.forEach(p => {
    if(p.adminOnly && currentUser.role!=='admin') return;
    const btn = document.createElement('button');
    btn.className = 'sidebar-item';
    btn.id = 'nav-'+p.id;
    btn.innerHTML = `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="${p.icon}"/></svg>${p.label}`;
    btn.onclick = () => navigate(p.id);

let _allStmtRawData = null;

async function renderAllStatements() {
  $('content').innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8">جارٍ تحميل البيانات...</div>';
  try {
    const [custs, allInvs, allPays] = await Promise.all([
      getCustomers(), getInvoices(), getPayments()
    ]);

    const data = custs.map(c => {
      const invs = allInvs.filter(i=>i.customer_id===c.id);
      const pays = allPays.filter(p=>p.customer_id===c.id);
      const iqd = {
        inv: invs.filter(i=>i.currency==='IQD').reduce((s,i)=>s+parseFloat(i.amount||0),0),
        pay: pays.filter(p=>p.currency==='IQD').reduce((s,p)=>s+parseFloat(p.amount||0),0),
      };
      const usd = {
        inv: invs.filter(i=>i.currency==='USD').reduce((s,i)=>s+parseFloat(i.amount||0),0),
        pay: pays.filter(p=>p.currency==='USD').reduce((s,p)=>s+parseFloat(p.amount||0),0),

let _companyInfoCache = null;

async function getCompanyInfo() {
  if(_companyInfoCache) return _companyInfoCache;
  try {
    const {data} = await sb.from('company_settings').select('*').eq('user_id', currentUser.id).single();
    _companyInfoCache = data || {};
    return _companyInfoCache;
  } catch(e) {
    // fallback to localStorage
    try { return JSON.parse(localStorage.getItem('companyInfo')||'{}'); } catch(e){ return {}; }
  }
}

async function saveCompanyInfo(info) {
  _companyInfoCache = info;
  try {
    const {data: existing} = await sb.from('company_settings').select('id').eq('user_id', currentUser.id).single();
    if(existing) {
      await sb.from('company_settings').update({...info, updated_at: new Date().toISOString()}).eq('user_id', currentUser.id);
    } else {
      await sb.from('company_settings').insert({...info, user_id: currentUser.id});
    }
  } catch(e) {
    localStorage.setItem('companyInfo', JSON.stringify(info));
  }
}

// ═══ ALERTS SYSTEM ═══
async function checkAlerts() {
  try {
    const [custs, allInvs, allPays] = await Promise.all([
      getCustomers(), getInvoices(), getPayments()
    ]);
    const alerts = [];
    const nowMs = new Date().getTime();

    custs.forEach(c => {
      const invs = allInvs.filter(i=>i.customer_id===c.id);
      const pays = allPays.filter(p=>p.customer_id===c.id);

      // Balance per currency
      ['IQD','USD'].forEach(cur => {
        const totInv = invs.filter(i=>i.currency===cur).reduce((s,i)=>s+parseFloat(i.amount||0),0);
        const totPay = pays.filter(p=>p.currency===cur).reduce((s,p)=>s+parseFloat(p.amount||0),0);
        const bal = totInv - totPay;

        // Credit limit alert
        const limit = cur==='IQD' ? c.limit_iqd : c.limit_usd;
        if(limit && bal > limit) {
          alerts.push({
            type: 'limit',
            level: 'danger',
            customer: c.name,
            custId: c.id,
            msg: `تجاوز حد الدين بـ ${cur}`,
            detail: `الرصيد: ${Number(bal).toLocaleString('en')} ${cur} | الحد: ${Number(limit).toLocaleString('en')} ${cur}`,
            cur
          });
        }
      });

      // Payment period alert - check last payment date
      if(c.payment_days) {
        const custPays = pays.sort((a,b)=>b.date.localeCompare(a.date));
        const lastPayDate = custPays[0]?.date;
        const checkDate = lastPayDate || (invs.sort((a,b)=>a.date.localeCompare(b.date))[0]?.date);
        if(checkDate) {
          const daysDiff = Math.floor((nowMs - new Date(checkDate).getTime()) / (1000*60*60*24));
          if(daysDiff > c.payment_days) {
            // Check if still has balance
            const totInvAll = allInvs.filter(i=>i.customer_id===c.id).reduce((s,i)=>s+parseFloat(i.amount||0),0);
            const totPayAll = allPays.filter(p=>p.customer_id===c.id).reduce((s,p)=>s+parseFloat(p.amount||0),0);
            if(totInvAll > totPayAll) {
              alerts.push({
                type: 'overdue',
                level: 'warning',
                customer: c.name,
                custId: c.id,
                msg: `تجاوز فترة السداد`,
                detail: `آخر دفعة: ${lastPayDate||'لا يوجد'} | مضى ${daysDiff} يوم | الفترة المسموحة: ${c.payment_days} يوم`,
              });
            }
          }
        }
      }
    });

    // Update badge
    const badge = $('alert-badge');
    if(badge) {
      if(alerts.length > 0) {
        badge.textContent = alerts.length > 9 ? '9+' : alerts.length;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }
    window._alerts = alerts;
    return alerts;
  } catch(e) { return []; }
}

async function saveCustomer(id) {
  const name=$('f-name').value.trim(),phone=$('f-phone').value.trim(),area=$('f-area').value.trim(),notes=$('f-notes').value.trim();
  const limitIqd = parseFloat($('f-limit-iqd')?.value||0)||null;
  const limitUsd = parseFloat($('f-limit-usd')?.value||0)||null;
  const payDays  = parseInt($('f-pay-days')?.value||0)||null;
  if(!name){$('f-err').textContent='الاسم مطلوب';$('f-err').style.display='block';return;}
  try {
    // Check for duplicate name
    const existing = _custs.filter(c => {
      const match = c.name.trim().toLowerCase() === name.toLowerCase();
      if(id) return match && c.id !== id; // ignore self when editing
      return match;
    });
    if(existing.length > 0) {
      $('f-err').innerHTML = `⚠️ يوجد زبون بنفس الاسم: <strong>${esc(existing[0].name)}</strong> — هل تريد المتابعة؟<br/><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-primary" onclick="forceSaveCustomer('${id||''}')" style="padding:6px 14px;border-radius:8px;font-size:12px;font-family:Cairo,sans-serif">نعم، أضف على أي حال</button><button onclick="document.getElementById('f-err').style.display='none'" style="padding:6px 14px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:12px;font-family:Cairo,sans-serif;cursor:pointer">إلغاء</button></div>`;
      $('f-err').style.display='block';
      return;
    }
    await doSaveCustomer(id, name, phone, area, notes, limitIqd, limitUsd, payDays);
  } catch(e){$('f-err').textContent=e.message;$('f-err').style.display='block';}
}

async function forceSaveCustomer(id) {
  const name=$('f-name').value.trim(),phone=$('f-phone').value.trim(),area=$('f-area').value.trim(),notes=$('f-notes').value.trim();
  const limitIqd = parseFloat($('f-limit-iqd')?.value||0)||null;
  const limitUsd = parseFloat($('f-limit-usd')?.value||0)||null;
  const payDays  = parseInt($('f-pay-days')?.value||0)||null;
  await doSaveCustomer(id||null, name, phone, area, notes, limitIqd, limitUsd, payDays);
}

async function doSaveCustomer(id, name, phone, area, notes, limitIqd, limitUsd, payDays) {
  try {
    let custId = id;
    if(id) {
      await dbUpdate('customers',id,{name,phone,area,notes,limit_iqd:limitIqd,limit_usd:limitUsd,payment_days:payDays});
    } else {
      const newCust = await dbInsert('customers',{name,phone,area,notes,limit_iqd:limitIqd,limit_usd:limitUsd,payment_days:payDays,rep_id:currentUser.id});
      custId = newCust.id;

      // Handle opening balance
      const obAmount = parseFloat($('f-ob-amount')?.value||0);
      const obCur = $('f-ob-cur')?.value || 'IQD';
      const obType = document.querySelector('input[name="ob-type"]:checked')?.value || 'debit';

      if(obAmount > 0) {
        if(obType === 'debit') {
          // مدين = فاتورة افتتاحية
          await dbInsert('invoices', {
            invoice_number: 'OB-001',
            customer_id: custId,
            amount: obAmount,
            currency: obCur,
            date: today(),
            notes: 'رصيد افتتاحي - مدين',
            rep_id: currentUser.id
          });
        } else {
          // دائن = تسديد افتتاحي (الزبون دفع مسبقاً)
          await dbInsert('payments', {
            customer_id: custId,
            amount: obAmount,
            currency: obCur,
            date: today(),
            notes: 'رصيد افتتاحي - دائن',
            rep_id: currentUser.id
          });
        }
      }
    }
    closeModal(); showToast(id?'تم التعديل':'تمت الإضافة'); renderCustomers();
  } catch(e){$('f-err').textContent=e.message;$('f-err').style.display='block';}
}

async function deleteCustomer(id) {
  if(!confirm('هل تريد حذف هذا الزبون؟')) return;
  try { await dbDelete('customers',id); showToast('تم الحذف'); renderCustomers(); }
  catch(e){showToast(e.message,false);}
}

function filterPayments() {
  const dateFrom = $('f-date-from')?.value || '';
  const dateTo   = $('f-date-to')?.value   || '';
  const cur      = $('f-pay-cur')?.value   || '';
  const custF    = $('f-pay-cust')?.value  || '';
  const custMap  = {};
  _custs.forEach(c=>custMap[c.id]=c.name);

  let filtered = _pays.filter(p => {
    if(dateFrom && p.date < dateFrom) return false;
    if(dateTo   && p.date > dateTo)   return false;
    if(cur      && p.currency !== cur) return false;
    if(custF    && p.customer_id !== custF) return false;
    return true;
  });

  // Totals
  const totIQD = filtered.filter(p=>p.currency==='IQD').reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const totUSD = filtered.filter(p=>p.currency==='USD').reduce((s,p)=>s+parseFloat(p.amount||0),0);

  const wrap = $('pays-table-wrap');
  if(!wrap) return;

  wrap.innerHTML = `
    <!-- Totals -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
      <div class="card" style="padding:14px;text-align:center;background:#f0fdf4;border-color:#bbf7d0">
        <div style="font-size:11px;color:#64748b;margin-bottom:3px">عدد التسديدات</div>
        <div style="font-weight:800;color:#1e293b;font-size:18px">${filtered.length}</div>
      </div>
      <div class="card" style="padding:14px;text-align:center;background:#f0fdf4;border-color:#bbf7d0">
        <div style="font-size:11px;color:#64748b;margin-bottom:3px">إجمالي (IQD)</div>
        <div style="font-weight:800;color:#16a34a;font-size:15px">${fmt(totIQD,'IQD')}</div>
      </div>
      <div class="card" style="padding:14px;text-align:center;background:#eff6ff;border-color:#bfdbfe">
        <div style="font-size:11px;color:#64748b;margin-bottom:3px">إجمالي (USD)</div>
        <div style="font-weight:800;color:#1d4ed8;font-size:15px">${fmt(totUSD,'USD')}</div>
      </div>
    </div>

    <div class="card fade" style="overflow:hidden">
      <div style="padding:10px 16px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700;color:#1e293b;font-size:13px">قائمة التسديدات</span>
        <span style="font-size:12px;color:#64748b">${filtered.length} سجل</span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>

async function savePayment(id) {
  const cust=$('f-cust').value,amount=parseFloat($('f-amount').value),cur=$('f-cur').value,date=$('f-date').value,notes=$('f-notes').value.trim();
  if(!cust||!amount){$('f-err').textContent='الرجاء إكمال الحقول المطلوبة';$('f-err').style.display='block';return;}
  try {
    const obj={customer_id:cust,amount,currency:cur,date,notes};
    if(id) await dbUpdate('payments',id,obj);
    else await dbInsert('payments',{...obj,rep_id:currentUser.id});
    closeModal(); showToast(id?'تم التعديل':'تمت الإضافة'); renderPayments();
  } catch(e){$('f-err').textContent=e.message;$('f-err').style.display='block';}
}

async function deletePayment(id) {
  if(!confirm('هل تريد حذف هذا التسديد؟')) return;
  try { await dbDelete('payments',id); showToast('تم الحذف'); renderPayments(); }
  catch(e){showToast(e.message,false);}
}

  const printDate = new Date().toLocaleDateString('en-GB');

  // Build running balance
  let runBal = 0;
  const rows = timeline.map((r,i) => {
    if(r.type==='invoice') runBal += parseFloat(r.amount||0);
    else runBal -= parseFloat(r.amount||0);
    return { ...r, idx:i+1, runBal };
  });

  const remColor = remaining <= 0 ? '#16a34a' : '#ea580c';

  // Create hidden print div
  const div = document.createElement('div');
  div.id = 'pdf-print-area';
  div.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:794px;background:#fff;font-family:Cairo,sans-serif;direction:rtl;padding:0;z-index:-1';

      ${info.logo?`<img src="${info.logo}" style="height:48px;margin-bottom:8px;border-radius:8px" onerror="this.style.display='none'"/><br/>`:''}
      <div style="font-size:22px;font-weight:800;margin-bottom:2px">${info.company||'نظام حسابات المناديب'}</div>

      ${info.phone?`<div style="font-size:11px;opacity:.8">📞 ${info.phone}</div>`:''}
    </div>
    <div style="background:#0ea5e9;padding:8px;text-align:center">
      <div style="font-size:15px;font-weight:700;color:#fff">كشف حساب زبون</div>
    </div>

    <div style="margin:16px 24px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div>
        <div style="margin-bottom:8px"><span style="font-weight:700;color:#374151">الزبون: </span><span style="color:#1e293b;font-size:15px;font-weight:600">${custName}</span></div>
        <div><span style="font-weight:700;color:#374151">العملة: </span><span style="color:#0284c7;font-weight:600">${curLabel}</span></div>
      </div>
      <div style="text-align:left">
        <div style="margin-bottom:8px"><span style="font-weight:700;color:#374151">التاريخ: </span><span>${printDate}</span></div>
        <div style="margin-bottom:4px"><span style="font-weight:700;color:#374151">المندوب: </span><span>${info.rep||currentUser.name||currentUser.email}</span></div>
        ${info.email?`<div><span style="font-weight:700;color:#374151">الإيميل: </span><span style="font-size:12px">${info.email}</span></div>`:''}
      </div>
    </div>

    <div style="margin:0 24px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:12px;color:#64748b;margin-bottom:4px">إجمالي الفواتير</div>
        <div style="font-weight:800;color:#dc2626;font-size:15px">${fmtN(totalInv)}</div>
      </div>
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:12px;color:#64748b;margin-bottom:4px">إجمالي التسديد</div>

        <div style="font-size:12px;color:#64748b;margin-bottom:4px">الرصيد المتبقي</div>
        <div style="font-weight:800;font-size:15px;color:${remColor}">${fmtN(Math.abs(remaining))}${remaining<0?' ✓':''}</div>
      </div>
    </div>

    <div style="margin:0 24px 8px;font-weight:700;color:#1e293b;font-size:14px;padding-bottom:6px;border-bottom:2px solid #e2e8f0">
      سجل المعاملات
    </div>

    <table style="width:calc(100% - 48px);margin:8px 24px;border-collapse:collapse;font-size:12px">
      <thead>
        <tr style="background:#0f172a;color:#fff">
          <th style="padding:9px 10px;text-align:right;border-radius:0">#</th>
          <th style="padding:9px 10px;text-align:right">النوع</th>
          <th style="padding:9px 10px;text-align:right">التاريخ</th>

          <th style="padding:9px 10px;text-align:right">الرصيد</th>
        </tr>
      </thead>
      <tbody>
        ${rows.length===0
          ? `<tr><td colspan="7" style="text-align:center;padding:20px;color:#94a3b8">لا توجد معاملات</td></tr>`
          : rows.map((r,i)=>`
          <tr style="background:${i%2===0?'#f8fafc':'#fff'};border-bottom:1px solid #f1f5f9">

              </span>
            </td>
            <td style="padding:8px 10px;color:#475569">${r.date}</td>
            <td style="padding:8px 10px;color:#1e293b">${r.invoice_number||r.notes||'—'}</td>
            <td style="padding:8px 10px;font-weight:700;color:#dc2626">${r.type==='invoice'?fmtN(r.amount):'—'}</td>
            <td style="padding:8px 10px;font-weight:700;color:#16a34a">${r.type==='payment'?fmtN(r.amount):'—'}</td>
            <td style="padding:8px 10px;font-weight:700;color:${r.runBal>0?'#ea580c':'#16a34a'}">${fmtN(Math.abs(r.runBal))}${r.runBal<0?' ✓':''}</td>
          </tr>`).join('')}
      </tbody>
    </table>

    <div style="margin:16px 24px 8px;padding:10px 16px;background:#f8fafc;border-radius:8px;display:flex;justify-content:space-between;font-size:11px;color:#94a3b8">

      <span>طُبع بتاريخ: ${printDate}</span>
    </div>
  `;
  document.body.appendChild(div);

  showToast('جارٍ تجهيز PDF...');

  setTimeout(async () => {
    try {
      const canvas = await html2canvas(div, {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        width: 794,
      });
      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
      const W = pdf.internal.pageSize.getWidth();
      const H = pdf.internal.pageSize.getHeight();
      const imgH = (canvas.height * W) / canvas.width;

      if(imgH <= H) {
        pdf.addImage(imgData,'PNG',0,0,W,imgH);
      } else {
        // Multi-page
        let yPos = 0;
        while(yPos < imgH) {
          if(yPos > 0) pdf.addPage();
          pdf.addImage(imgData,'PNG',0,-yPos,W,imgH);
          yPos += H;
        }
      }

      pdf.save(`كشف-حساب-${custName}-${cur}-${today()}.pdf`);
      showToast('تم تصدير PDF بنجاح! ✅');
    } catch(e) {
      showToast('خطأ في التصدير: '+e.message, false);
    }
    document.body.removeChild(div);
  }, 300);
}

                ${u.role==='admin'?'👑':'👤'}
              </div>
              <div>
                <div style="font-weight:700;color:#1e293b;font-size:15px">${esc(u.name)}</div>
                <span class="${u.role==='admin'?'badge-admin':'badge-rep'}">${u.role==='admin'?'مدير النظام':'مندوب مبيعات'}</span>
              </div>
              ${u.id===currentUser.id?'<span style="margin-right:auto;background:#dcfce7;color:#166534;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700">أنت</span>':''}
            </div>
            <div style="display:flex;gap:8px;padding-top:10px;border-top:1px solid #f1f5f9">
              <button class="btn" onclick="openEditUser('${u.id}','${esc(u.name)}','${u.role}')" style="flex:1;padding:7px;border-radius:10px;background:#f8fafc;color:#475569;font-size:13px;font-weight:600;font-family:Cairo,sans-serif">✏️ تعديل</button>
              ${u.id!==currentUser.id?`<button class="btn" onclick="deleteUser('${u.id}')" style="padding:7px 10px;border-radius:10px;background:#fef2f2;color:#ef4444">🗑</button>`:''}
            </div>
          </div>`).join('')}
      </div>`;
  } catch(e){$('content').innerHTML=`<div class="alert-err">${e.message}</div>`;}
}

function openAddUser() {
  showModal('إضافة مستخدم جديد', `
    <div class="alert-warn">سيتم إنشاء المستخدم في Supabase Authentication — تأكد من صلاحيات Service Role إن واجهت مشكلة، أو أضفه من لوحة Supabase مباشرة.</div>
    <div style="margin-bottom:14px"><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">الاسم الكامل *</label><input class="inp" id="f-name" placeholder="اسم المندوب"/></div>
    <div style="margin-bottom:14px"><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">البريد الإلكتروني *</label><input class="inp" id="f-email" type="email" placeholder="example@email.com"/></div>
    <div style="margin-bottom:14px"><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">كلمة المرور *</label><input class="inp" id="f-pass" type="password" placeholder="8 أحرف على الأقل"/></div>
    <div style="margin-bottom:18px"><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">الصلاحية</label><select class="inp" id="f-role"><option value="rep">مندوب مبيعات</option><option value="admin">مدير النظام</option></select></div>
    <div id="f-err" class="alert-err" style="display:none"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="saveUser(null)" style="flex:1;padding:11px;border-radius:12px;font-size:15px;font-weight:700;font-family:Cairo,sans-serif">إنشاء المستخدم</button>
      <button class="btn" onclick="closeModal()" style="padding:11px 18px;border-radius:12px;border:1.5px solid #e2e8f0;color:#475569;font-family:Cairo,sans-serif;font-weight:600">إلغاء</button>
    </div>`);
}

function openEditUser(id, name, role) {
  showModal('تعديل المستخدم', `
    <div style="margin-bottom:14px"><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">الاسم الكامل *</label><input class="inp" id="f-name" value="${name}"/></div>
    <div style="margin-bottom:18px"><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">الصلاحية</label><select class="inp" id="f-role"><option value="rep" ${role==='rep'?'selected':''}>مندوب مبيعات</option><option value="admin" ${role==='admin'?'selected':''}>مدير النظام</option></select></div>
    <div id="f-err" class="alert-err" style="display:none"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="saveUser('${id}')" style="flex:1;padding:11px;border-radius:12px;font-size:15px;font-weight:700;font-family:Cairo,sans-serif">حفظ</button>
      <button class="btn" onclick="closeModal()" style="padding:11px 18px;border-radius:12px;border:1.5px solid #e2e8f0;color:#475569;font-family:Cairo,sans-serif;font-weight:600">إلغاء</button>
    </div>`);
}

async function saveUser(id) {
  const name=$('f-name')?.value.trim(), role=$('f-role').value;
  if(!name){$('f-err').textContent='الاسم مطلوب';$('f-err').style.display='block';return;}
  try {
    if(id) {
      await dbUpdate('profiles',id,{name,role});
      closeModal(); showToast('تم التعديل'); renderUsers();
    } else {
      const email=$('f-email').value.trim(), pass=$('f-pass').value;
      if(!email||!pass){$('f-err').textContent='الإيميل وكلمة المرور مطلوبة';$('f-err').style.display='block';return;}
      // Use signUp then update profile
      const {data,error} = await sb.auth.signUp({email,password:pass,options:{data:{name,role}}});
      if(error) throw error;
      if(data.user) await dbUpdate('profiles',data.user.id,{name,role});
      closeModal(); showToast('تم إنشاء المستخدم — تأكد من تفعيله في Supabase'); renderUsers();
    }
  } catch(e){$('f-err').textContent=e.message;$('f-err').style.display='block';}
}

async function deleteUser(id) {
  if(!confirm('هل تريد حذف هذا المستخدم؟')) return;
  try { await dbDelete('profiles',id); showToast('تم الحذف'); renderUsers(); }
  catch(e){showToast(e.message,false);}
}

function togglePassVis(inputId, eyeId) {
  const inp = document.getElementById(inputId);
  const eye = document.getElementById(eyeId);
  if(!inp) return;
  if(inp.type==='password') {
    inp.type = 'text';
    eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function showChangePassword() {
  showModal('تغيير كلمة المرور', `
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">كلمة المرور الجديدة *</label>
      <div style="position:relative">
        <input class="inp" id="cp-new" type="password" placeholder="••••••••" style="padding-left:40px"/>
        <button type="button" onclick="togglePassVis('cp-new','eye-cp1')" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8">
          <svg id="eye-cp1" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div style="margin-bottom:18px">
      <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">تأكيد كلمة المرور *</label>
      <div style="position:relative">
        <input class="inp" id="cp-confirm" type="password" placeholder="••••••••" style="padding-left:40px"/>
        <button type="button" onclick="togglePassVis('cp-confirm','eye-cp2')" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8">
          <svg id="eye-cp2" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div id="cp-err" class="alert-err" style="display:none"></div>
    <div id="cp-ok" style="display:none;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;padding:10px;border-radius:10px;font-size:13px;margin-bottom:12px"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="doChangePassword()" style="flex:1;padding:11px;border-radius:12px;font-size:15px;font-weight:700;font-family:Cairo,sans-serif">تغيير كلمة المرور</button>
      <button class="btn" onclick="closeModal()" style="padding:11px 18px;border-radius:12px;border:1.5px solid #e2e8f0;color:#475569;font-family:Cairo,sans-serif;font-weight:600">إلغاء</button>
    </div>`);
}

async function doChangePassword() {
  const np = $('cp-new').value;
  const cp = $('cp-confirm').value;
  $('cp-err').style.display='none';
  $('cp-ok').style.display='none';
  if(!np || np.length < 6) { $('cp-err').textContent='كلمة المرور يجب أن تكون 6 أحرف على الأقل'; $('cp-err').style.display='block'; return; }
  if(np !== cp) { $('cp-err').textContent='كلمتا المرور غير متطابقتين'; $('cp-err').style.display='block'; return; }
  try {
    const { error } = await sb.auth.updateUser({ password: np });
    if(error) throw error;
    $('cp-ok').textContent = '✅ تم تغيير كلمة المرور بنجاح!';
    $('cp-ok').style.display = 'block';
    setTimeout(()=>closeModal(), 2000);
  } catch(e) {
    $('cp-err').textContent = e.message;
    $('cp-err').style.display = 'block';
  }
}

function showForgotPassword() {
  const email = $('login-email').value.trim();
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px';
  div.innerHTML = `
    <div style="background:#fff;border-radius:20px;padding:28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <h3 style="font-size:17px;font-weight:800;color:#1e293b;margin:0 0 8px">نسيت كلمة المرور؟</h3>
      <p style="font-size:13px;color:#64748b;margin:0 0 16px">أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين</p>
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">البريد الإلكتروني</label>
        <input class="inp" id="forgot-email" type="email" value="${email}" placeholder="example@email.com"/>
      </div>
      <div id="forgot-msg" style="display:none;margin-bottom:12px"></div>
      <div style="display:flex;gap:10px">
        <button onclick="sendResetEmail()" class="btn btn-primary" style="flex:1;padding:11px;border-radius:12px;font-size:14px;font-weight:700;font-family:Cairo,sans-serif">إرسال الرابط</button>
        <button onclick="this.closest('[style*=fixed]').remove()" style="padding:11px 16px;border-radius:12px;border:1.5px solid #e2e8f0;color:#475569;font-family:Cairo,sans-serif;font-weight:600;background:#fff;cursor:pointer">إلغاء</button>
      </div>
      <div style="margin-top:16px;padding:12px;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;font-size:12px;color:#92400e">
        <strong>ملاحظة:</strong> إذا لم يصلك الإيميل، تواصل مع المدير لإعادة تعيين كلمة المرور يدوياً.
      </div>
    </div>`;
  document.body.appendChild(div);
}

async function sendResetEmail() {
  const email = document.getElementById('forgot-email').value.trim();
  const msg = document.getElementById('forgot-msg');
  if(!email) {
    msg.innerHTML = '<div class="alert-err">الرجاء إدخال البريد الإلكتروني</div>';
    msg.style.display = 'block';
    return;
  }
  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.href
    });
    if(error) throw error;
    msg.innerHTML = '<div style="background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;padding:10px;border-radius:10px;font-size:13px">✅ تم الإرسال! تحقق من بريدك الإلكتروني</div>';
    msg.style.display = 'block';
  } catch(e) {
    msg.innerHTML = `<div class="alert-err">${e.message==='Email rate limit exceeded'?'تجاوزت الحد المسموح، انتظر قليلاً وحاول مرة أخرى':e.message}</div>`;
    msg.style.display = 'block';
  }
}

window.addEventListener('load', async () => {
  $('login-page').style.display = 'flex';
  // Check existing session
  try {
    const {data:{session}} = await sb.auth.getSession();
    if(session) {
      const {data:profile} = await sb.from('profiles').select('*').eq('id',session.user.id).single();
      if(profile) {
        currentUser = {id:session.user.id, email:session.user.email, name:profile.name||session.user.email, role:profile.role||'rep'};
        showApp();
        return;
      }
    }
  } catch(e){}
  $('login-page').style.display = 'flex';
});

// Mobile menu
if(window.innerWidth<=768) {
  $('menu-btn').style.display='flex';
  document.addEventListener('click', e=>{
    const sidebar=$('sidebar');
    if(!sidebar.contains(e.target)&&!$('menu-btn').contains(e.target)) sidebar.classList.remove('open');
  });
}
